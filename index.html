<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title> NumPy and Matplotlib ♡ </title>

    <!-- Pyscript stylesheet -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Pyscript Module-->
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>

    <!-- Style CSS -->
    <link rel="stylesheet" type="text/css" href="style.css">

    <!-- icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div class="container">
        <h3> My Grade 10 Classmates ♡</h3><hr>
        <h6> Here are the steps! </h6>
        <h6>  1. Enter your name, section, and your favorite subject! </h6>
        <h6>  4. Then click "Add this lovely Student!" </h6>
        <h6>  5. Then click "Show list!" </h6>
    </div>

    <div class="container">
        <input type="text" id="name" class="form-control" placeholder="Enter your name ♡">
        <br>
        <input type="section" id="section" class="form-control" placeholder="Enter your section ♡">
        <br>
        <input type="subject" id="favoritesubject" class="form-control" placeholder="Enter your favorite subject ♡">

        <br>
        <button class="btn btn-primary" py-click="add">Add this lovely Student! ♡</button>
        
        <br><br>
        <button class="btn btn-success" py-click="show">Show List! ♡</button>
    </div>

    <div class="container" id="output"></div>
    <py-script src="main.py"></py-script>
</body>
</html>
